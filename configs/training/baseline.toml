[run]
name = "baseline-large-local"
output_dir = "data/runs/baseline-large-local"
seed = 13
device = "auto"
compile = false

[data]
artifact_dir = "data/artifacts/large-local"
prepared_dir = "data/prepared/baseline-large-local"
reuse_prepared = true

[model]
context_length = 256
d_model = 256
num_layers = 6
num_heads = 8
ffw_multiplier = 4.0
dropout = 0.1
bias = true

[optimizer]
learning_rate = 0.0003
min_learning_rate = 0.00003
weight_decay = 0.1
beta1 = 0.9
beta2 = 0.95
grad_clip_norm = 1.0

[training]
batch_size = 32
max_steps = 5000
warmup_steps = 250
eval_interval = 250
eval_batches = 24
log_interval = 25
checkpoint_interval = 500
sample_interval = 250

[generation]
prompt = "Conversation\n\nUser: Explain why healthy plants droop less after the soil drains.\nAssistant:"
max_new_chars = 400
temperature = 0.85
top_k = 48
