source_files = [
  "configs/dataset/sources/local_expository.toml",
  "configs/dataset/sources/local_qa.toml",
  "configs/dataset/sources/local_dialogue.toml",
  "configs/dataset/sources/local_prose.toml",
]

[pipeline]
name = "large-local"
seed = 19
output_dir = "data/artifacts/large-local"
target_total_chars = 25000000
preview_chars = 550
inspection_samples_per_family = 4

[cleaning]
normalize_unicode = true
strip_html = true
strip_wiki_markup = true
strip_zero_width = true
collapse_internal_whitespace = true
collapse_blank_lines_to = 2
trim_line_edges = true
decode_html_entities = true

[quality]
min_chars = 180
max_chars = 22000
min_unique_chars = 24
min_alpha_ratio = 0.58
max_symbol_ratio = 0.22
max_digit_ratio = 0.20
max_nonprintable_ratio = 0.01
max_line_length = 700
max_duplicate_line_ratio = 0.38
max_repeated_ngram_ratio = 0.22
allow_urls = false

[dedup]
enabled = true
exact = true
near = false
simhash_threshold = 5
minimum_tokens_for_near_dedup = 24

[formatting]
include_family_header = true
include_source_header = false
include_titles = true
document_separator = "\n\n<|endofsample|>\n\n"
article_header = "Article"
qa_header = "Q&A"
conversation_header = "Conversation"
story_header = "Story"

[split]
train = 0.985
validation = 0.01
test = 0.005

[mixture]
minimum_samples_per_family = 1

[mixture.family_weights]
expository = 0.34
qa = 0.26
dialogue = 0.24
prose = 0.16

[reporting]
dominance_threshold = 0.35
top_sources = 16
preview_sources_per_family = 3
preview_samples_per_source = 1
