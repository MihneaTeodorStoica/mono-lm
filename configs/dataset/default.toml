[pipeline]
name = "default-local"
seed = 13
output_dir = "data/artifacts/default-local"
target_total_chars = 2000000
preview_chars = 450
inspection_samples_per_family = 5

[cleaning]
normalize_unicode = true
strip_html = true
strip_wiki_markup = true
strip_zero_width = true
collapse_internal_whitespace = true
collapse_blank_lines_to = 2
trim_line_edges = true
decode_html_entities = true

[quality]
min_chars = 120
max_chars = 15000
min_unique_chars = 20
min_alpha_ratio = 0.55
max_symbol_ratio = 0.22
max_digit_ratio = 0.25
max_nonprintable_ratio = 0.01
max_line_length = 500
max_duplicate_line_ratio = 0.45
max_repeated_ngram_ratio = 0.25
allow_urls = false

[dedup]
enabled = true
exact = true
near = true
simhash_threshold = 6
minimum_tokens_for_near_dedup = 24

[formatting]
include_family_header = true
include_source_header = false
include_titles = true
document_separator = "\n\n<|endofsample|>\n\n"
article_header = "Article"
qa_header = "Q&A"
conversation_header = "Conversation"
story_header = "Story"

[split]
train = 0.96
validation = 0.02
test = 0.02

[mixture]
minimum_samples_per_family = 1

[mixture.family_weights]
expository = 0.38
qa = 0.24
dialogue = 0.24
prose = 0.14

[reporting]
dominance_threshold = 0.38
top_sources = 12
preview_sources_per_family = 2
preview_samples_per_source = 1

[[sources]]
name = "expository_texts"
family = "expository"
kind = "text_dir"
path = "data/raw/expository"
glob = "**/*.txt"
title_from_first_line = true

[[sources]]
name = "grounded_qa"
family = "qa"
kind = "jsonl"
path = "data/raw/qa/discussions.jsonl"
question_field = "question"
answer_field = "answer"
context_field = "context"
id_field = "id"

[[sources]]
name = "synthetic_dialogue"
family = "dialogue"
kind = "jsonl"
path = "data/raw/dialogue/dialogues.jsonl"
turns_field = "messages"
turn_role_field = "role"
turn_text_field = "content"
id_field = "id"

[[sources]]
name = "long_form_prose"
family = "prose"
kind = "text_dir"
path = "data/raw/prose"
glob = "**/*.txt"
title_from_first_line = true
